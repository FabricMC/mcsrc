name: Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - run: ./gradlew build
        working-directory: java
      - run: npm ci
      - run: npm run build
      - run: npm run test
      - run: npm run lint
      - id: deploy
        env:
          NO_COLOR: "1"
        run: |
          set -o pipefail
          {
            echo
            echo "/*"
            echo "  X-Robots-Tag: noindex, nofollow, noarchive"
          } >> dist/_headers
          find dist -name '*.map' -delete

          npx wrangler deploy --temporary 2>&1 | tee wrangler-deploy.log

          url="$(awk '/https:\/\/.*\.workers\.dev/ { print $1 }' wrangler-deploy.log | tail -n 1)"
          if [ -z "$url" ]; then
            echo "Unable to find temporary deployment URL in Wrangler output" >&2
            exit 1
          fi

          echo "url=${url}" >> "$GITHUB_OUTPUT"

          {
            echo "### Temporary preview"
            echo
            echo "[Open deployed site](${url})"
            echo
            echo "This temporary Wrangler deployment expires after 60 minutes."
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@v4
        with:
          name: java-libs
          path: java/build/libs/

  e2e-tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            browser: chromium
          - os: ubuntu-24.04
            browser: firefox
          - os: macos-latest
            browser: webkit
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: java-libs
          path: java/build/libs/
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npm run test:e2e -- --project=${{ matrix.browser }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.os }}-${{ matrix.browser }}
          path: playwright-report/
